<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LightTI icon</title>
  <desc>Geometric threat intelligence icon featuring a diamond with concentric angular rings and crosshair lines in cyan on dark background</desc>

  <rect x="0" y="0" width="400" height="400" rx="48" fill="#060a0e"/>

  <line x1="200" y1="20" x2="200" y2="380" stroke="#00c8ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="20" y1="200" x2="380" y2="200" stroke="#00c8ff" stroke-width="0.5" opacity="0.2"/>

  <polygon points="200,40 320,200 200,360 80,200" fill="none" stroke="#00c8ff" stroke-width="0.5" opacity="0.25"/>
  <polygon points="200,70 290,200 200,330 110,200" fill="none" stroke="#00c8ff" stroke-width="0.75" opacity="0.35"/>
  <polygon points="200,100 260,200 200,300 140,200" fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.5"/>

  <polygon points="200,130 230,200 200,270 170,200" fill="#00c8ff" opacity="0.15"/>
  <polygon points="200,130 230,200 200,270 170,200" fill="none" stroke="#00c8ff" stroke-width="1.5"/>

  <line x1="0" y1="200" x2="80" y2="200" stroke="#00c8ff" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#00c8ff" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="0" x2="200" y2="80" stroke="#00c8ff" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="320" x2="200" y2="400" stroke="#00c8ff" stroke-width="1" opacity="0.6"/>

  <circle cx="200" cy="200" r="4" fill="#00c8ff"/>

  <rect x="0" y="350" width="400" height="4" rx="2" fill="#00c8ff" opacity="0.8"/>

  <rect x="0" y="0" width="400" height="400" rx="48" fill="none" stroke="#162030" stroke-width="1.5"/>
</svg>
